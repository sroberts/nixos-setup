name: check

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on new pushes to the same ref — saves CI minutes
# during rebase/force-push cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Drop a stub hardware-configuration.nix so the flake evaluates in CI.
      # The real one is per-machine and gitignored (see CLAUDE.md / INSTALL.md).
      # The fileSystems / boot options come from this file on the real host;
      # in CI we only need the flake to *evaluate*, not boot.
      - name: Stub hardware-configuration.nix
        run: |
          cat > hardware-configuration.nix <<'EOF'
          { lib, modulesPath, ... }:
          {
            imports = [ (modulesPath + "/installer/scan/not-detected.nix") ];
            boot.initrd.availableKernelModules = [ ];
            boot.initrd.kernelModules = [ ];
            boot.kernelModules = [ ];
            boot.extraModulePackages = [ ];
            fileSystems."/" = { device = "/dev/disk/by-label/stub-root"; fsType = "ext4"; };
            fileSystems."/boot" = { device = "/dev/disk/by-label/stub-boot"; fsType = "vfat"; };
            nixpkgs.hostPlatform = lib.mkDefault "x86_64-linux";
            hardware.cpu.amd.updateMicrocode = lib.mkDefault true;
          }
          EOF

      - name: nix flake check
        run: nix flake check --no-build --show-trace

      - name: Evaluate the system closure (drvPath only, no build)
        run: |
          nix eval --raw \
            .#nixosConfigurations.sjr-fw13.config.system.build.toplevel.drvPath \
            --show-trace
