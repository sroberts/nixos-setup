name: check

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on new pushes to the same ref — saves CI minutes
# during rebase/force-push cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Each host's hardware-configuration.nix is committed under hosts/<name>/
      # (the LUKS UUIDs are identifiers, not secrets), so the flake evaluates
      # in CI with no stubbing. Device paths in those files are just strings —
      # evaluation never touches real disks.
      - name: nix flake check
        run: nix flake check --no-build --show-trace

      # Enforce nixfmt formatting on every .nix file. The flake's formatter
      # output (formatter.x86_64-linux = nixfmt) defines the canonical style;
      # this just refuses to merge anything that drifts. Run `nix fmt` locally
      # to fix.
      - name: nix fmt --check
        run: find . -name '*.nix' -not -path './.git/*' -print0 | xargs -0 nix fmt -- --check

      # Evaluate every discovered host's system closure (drvPath only, no
      # build), so adding a host automatically gets it eval-checked here.
      - name: Evaluate each host's system closure
        run: |
          hosts=$(nix eval --raw \
            --apply 'cfgs: builtins.concatStringsSep " " (builtins.attrNames cfgs)' \
            .#nixosConfigurations)
          for h in $hosts; do
            echo "== evaluating $h =="
            nix eval --raw \
              ".#nixosConfigurations.$h.config.system.build.toplevel.drvPath" \
              --show-trace
          done
